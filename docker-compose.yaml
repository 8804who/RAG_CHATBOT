services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - docker.env
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    ports:
      - "6379:6379"
    env_file:
      - docker.env
    volumes:
      - redis_data:/data
  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    env_file:
      - docker.env
    volumes:
      - qdrant_data:/qdrant/storage

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

  ingest-worker:
    build:
      context: ./backend/app
      dockerfile: WorkerImage.Dockerfile
    container_name: ingest-worker
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "workers.ingest_worker"]
    env_file:
      - backend/app/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # fastembed는 HF_HOME이 아니라 FASTEMBED_CACHE_PATH(기본값 /tmp/fastembed_cache)를
      # 따로 쓰므로 캐시 볼륨은 여기에 마운트해야 재시작해도 모델을 다시 받지 않는다.
      FASTEMBED_CACHE_PATH: /cache/fastembed
      HF_HUB_DISABLE_XET: "1"
      # HF Hub의 blobs+snapshots 심링크 캐시 구조에서 onnxruntime의 external-data 경로
      # 검증이 "External data path escapes model directory"로 실패하는 경우가 있어,
      # 심링크 대신 스냅샷 디렉터리에 실제 파일을 두도록 강제한다.
      HF_HUB_DISABLE_SYMLINKS: "1"
    volumes:
      - fastembed_cache:/cache/fastembed
    depends_on:
      - postgres
      - qdrant
      - kafka

volumes:
  postgres_data:
  redis_data:
  redis_insight_data:
  qdrant_data:
  kafka_data:
  fastembed_cache: